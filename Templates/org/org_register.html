<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    {% comment %} <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" /> {% endcomment %}
    {% comment %} <script src="{% static 'js/main.js' %}"></script> {% endcomment %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script> 
    <style>
        .btn-primary {
            color: #000;
            background-color: #00B98E;
            border-color: #00B98E;
        }
        a {
color: #00B98E;
text-decoration: none;
}
    </style>
  </head>

  <body style="background-color: hsl(0, 0%, 96%)">
    <!-- Section: Design Block -->
    <section >
      <!-- Jumbotron -->
      <div class="px-4 py-5  text-center text-lg-start">

       
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card rounded-lg mt-5" style="box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px; ">
                        <div class="card-header" style="background-color: #EFFDF5;"><h3 class="text-center font-weight-light my-4">Create Account</h3></div>
                        <div class="card-body">
                            <form class="form" action="" method="POST" enctype="multipart/form-data">
                                {% csrf_token %}
                                {% include 'mainweb/alert.html' %}
                        
                                <div class="row mb-3">
                                    <div class="col-md-6 text-dark">
                                        <div class="">
                                            <input class="form-control" name="full_name" id="full_name" type="text" placeholder="Enter your Full Name" autocomplete="off" required/>
                                        
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div >
                                            <input class="form-control"  name="username" type="text" id="username" placeholder="Enter your Username" autocomplete="off" required/>
                                            
                                        </div>
                                    </div>
                                </div>
                                <div class=" mb-3">
                                    <input class="form-control" id="email" type="email" name="email" placeholder="Enter Email" autocomplete="off" required/>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class=" mb-3 mb-md-0">
                                            <input class="form-control" id="password" type="password" name="password" placeholder="Create a password" autocomplete="off" required/>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3 mb-md-0">
                                            <input class="form-control" id="cpassword" type="password" name="cpassword" placeholder="Confirm password" autocomplete="off" required/>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="mt-4 mb-0"> 
                                    <input type="submit" name="submit" class="d-grid btn btn-primary btn-block text-decoration-none" value="Create Account">
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center py-3" style="background-color: #EFFDF5;">
                            <div class="small"><a href="/Organizer/org_login">Have an account? Go to login</a></div>
                        </div>
                    </div>
                </div>
            </div>
       

    <!-- Jumbotron -->
  </section>



  
<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function() {
        let form = document.getElementById('form');
        let full_name = document.getElementById('full_name');
        let username = document.getElementById('username');
        let email = document.getElementById('email');
        let password = document.getElementById('password');
        let cpassword = document.getElementById('cpassword');
  
        form.addEventListener('submit', function(event) {
          if(!validate()){  
            event.preventDefault(); }
        });
  
        function validate() {
            let full_nameval = full_name.value;
            let usernameval = username.value.trim();
            let emailval = email.value.trim();
            let passwordval = password.value.trim();
            let cpasswordval = cpassword.value.trim();
            let hasNumber = /\d/.test(usernameval);
            let hasCharacter = /[a-zA-Z]/.test(passwordval);
            let hasSpecialSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+/.test(passwordval);
            let hasNumberp = /\d/.test(passwordval);
  
            if (full_nameval === "") {
                alert("Full Name cannot be blank");
                return false;
            } else if (usernameval === "") {
                alert("Username cannot be blank");
                return false;
            } else if (usernameval.length <= 7) {
                alert('Username must be at least 8 characters long');
                return false;
            } else if (!hasNumber) {
                alert('Username must contain at least two numbers');
                return false;
            } else if (emailval === "") {
                alert('Email cannot be blank');
                return false;
            } else if (!isEmail(emailval)) {
                alert('Not a valid Email');
                return false;
            } else if (passwordval === "") {
                alert('Password cannot be blank');
                return false;
            } else if (passwordval.length <= 5) {
                alert('Password must be at least 6 characters long');
                return false;
            } else if (!hasCharacter || !hasSpecialSymbol || !hasNumberp) {
                alert('Password must contain at least one character, one special symbol, and one number');
                return false;
            } else if (cpasswordval === "") {
                alert('Confirm password cannot be blank');
                return false;
            } else if (passwordval !== cpasswordval) {
                alert('Passwords do not match');
                return false;
            } else {
                return true;
            }
            return true; 
        }
  
        function isEmail(emailval) {
            var atSymbol = emailval.indexOf("@");
            if (atSymbol < 1) return false;
            var dot = emailval.lastIndexOf('.');
            if (dot <= atSymbol + 2) return false;
            if (dot === emailval.length - 1) return false;
            return true;
        }
    });
  </script>
  
    
  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
</body>
</html>
