<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script> 
      <style>
        .btn-primary {
            color: #000;
            background-color: #00B98E;
            border-color: #00B98E;
        }
        a {
color: #00B98E;
text-decoration: none;
}
    </style>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  </head>

  <body style="background-color: hsl(0, 0%, 96%)">
    <!-- Section: Design Block -->
    <section >
      <!-- Jumbotron -->
      <div class="px-4 py-5  text-center text-lg-start">

       
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card rounded-lg mt-5" style="box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px; ">
                        <div class="card-header" style="background-color: #EFFDF5;"><h3 class="text-center font-weight-light my-4"> Account</h3></div>
                        <div class="card-body">
                            <form class="form" action="" method="POST" enctype="multipart/form-data" id="form" >
                                {% csrf_token %}
                                {% include 'mainweb/alert.html' %}
                        
                                {% if idr %}
                                <div class="row mb-3">
                                    <div class="col-md-6 text-dark">
                                        <div class="">
                                            <input class="form-control" id="full_name" name="full_name" value="{{idr.full_name}}" type="text" placeholder="Enter your Full Name" autocomplete="off" />
                                        
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div >
                                            <input class="form-control" id="username"  name="username" value="{{idr.username}}" type="text" placeholder="Enter your Username" autocomplete="off" />
                                            
                                        </div>
                                    </div>
                                </div>
                                <div class=" mb-3">
                                    <input class="form-control" id="email" type="email" value="{{idr.email}}" name="email" placeholder="Enter Email" autocomplete="off" />
                                   
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class=" mb-3 mb-md-0">
                                            <input class="form-control" id="phone" type="number" value="{{idr.phone_number}}" name="phone_number" placeholder="Phone Number" autoc omplete="off" required maxlength="10"/>
                                            
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3 mb-md-0">
                                            <input class="form-control"  type="file" value="{{idr.profile_image}}" name="profile_image" placeholder="Profile Image" id="file"
                                            onchange="return fileValidation()" required />
                                            
                                        </div>
                                    </div>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" value="is_active" name="is_active" required/>
                                    <label class="form-check-label" >I agree term and conditions.</label>
                                </div>

                                <div class="row">
                                    <div class="col-md-3">
                                        <div class="input-group">
                                            <div class="input-group-btn">
                                                <input type="submit" name="submit" value="Update" class="btn btn-success"  style="background-color:#01E1B8" onclick="displaySweetAlert()" />
                                               
                                                <input type="submit" name="submit" value="cancel" class="btn btn-success"  style="background-color:#01E1B8" />
                                                <br><br>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                               
                                {% else %}
                                <div class="row">
                                    <div class="col-md-6 text-dark">
                                        <div>
                                            <input class="form-control" name="full_name" id="full_name" type="text" placeholder="Enter your Full Name" autocomplete="off" required/>
                                        
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <div >
                                            <input class="form-control"  name="username" type="text" id="username" placeholder="Enter your Username" autocomplete="off" required/>
                                            
                                        </div>
                                    </div>
                                </div>
                                <div class=" mb-3">
                                    <input class="form-control" id="email" type="email" name="email" placeholder="Enter Email" autocomplete="off" required/>
                                   
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class=" mb-3 mb-md-0">
                                            <input class="form-control" id="password" type="password" name="password" placeholder="Create a password" autocomplete="off" required/>
                                            
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3 mb-md-0">
                                            <input class="form-control" id="cpassword" type="password" name="cpassword" placeholder="Confirm password" autocomplete="off" required/>
                                            
                                        </div>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <div class=" mb-3 mb-md-0">
                                            <input class="form-control" id="phone" type="number" name="phone_number" placeholder="Phone Number" autocomplete="off" required maxlength="10" />
                                            
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3 mb-md-0">
                                            <input class="form-control" required type="file" name="profile_image" placeholder="Profile Image" id="file" autocomplete="off"
                                            onchange="return fileValidation()" />
                                            
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="is_active" name="is_active" required autocomplete="off"/>&nbsp;
                                    <label class="form-check-label" >I agree term and conditions.</label>
                                </div>
                                <div class="mt-4 mb-0"> 
                                    <input type="submit" name="submit" class="d-grid btn btn-primary btn-block text-decoration-none" value="Create Account" >
                                </div>
                                {% endif %}
                            </form>
                        </div>
                        <div class="card-footer text-center py-3" style="background-color: #EFFDF5;">
                            <div class="small"><a href="/Customer/cust_login">Have an account? Go to login</a></div>
                        </div>
                    </div>
                </div>
            </div>
       

    <!-- Jumbotron -->
  </section>




  <!-- validation-->
  <script>
    function fileValidation() {
        var fileInput = 
            document.getElementById('file');
         
        var filePath = fileInput.value;
     
        // Allowing file type
        var allowedExtensions = 
                /(\.jpg|\.jpeg|\.png|\.gif)$/i;
         
        if (!allowedExtensions.exec(filePath)) {
            alert('Invalid file type');
            fileInput.value = '';
            return false;
        } 
        else 
        {
         
        }
    }
</script>

<script>
  function sweetalert() {
    swal("Good job!", "You clicked the button!", "success");
  }
</script>


<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function() {
      let form = document.getElementById('form');
      let full_name = document.getElementById('full_name');
      let username = document.getElementById('username');
      let email = document.getElementById('email');
      let phone = document.getElementById('phone');
      let password = document.getElementById('password');
      let cpassword = document.getElementById('cpassword');

      form.addEventListener('submit', function(event) {
        if(!validate()){  
          event.preventDefault(); }
      });

      function validate() {
          let full_nameval = full_name.value.trim();
          let usernameval = username.value.trim();
          let emailval = email.value.trim();
          let phoneval = phone.value.trim();
          let passwordval = password.value.trim();
          let cpasswordval = cpassword.value.trim();
          let hasNumber = /\d/.test(usernameval);
          let hasCharacter = /[a-zA-Z]/.test(passwordval);
          let hasSpecialSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+/.test(passwordval);
          let hasNumberp = /\d/.test(passwordval);

          if (full_nameval === "") {
              alert("Full Name cannot be blank");
              return false;
          } else if (usernameval === "") {
              alert("Username cannot be blank");
              return false;
          } else if (usernameval.length <= 7) {
              alert('Username must be at least 8 characters long');
              return false;
          } else if (!hasNumber) {
              alert('Username must contain at least two numbers');
              return false;
          } else if (emailval === "") {
              alert('Email cannot be blank');
              return false;
          } else if (!isEmail(emailval)) {
              alert('Not a valid Email');
              return false;
          } else if (phoneval === "") {
              alert('Phone number cannot be blank');
              return false;
          } else if (phoneval.length !== 10) {
              alert('Not a valid phone number. Please enter 10 digits only');
              return false;
          } else if (passwordval === "") {
              alert('Password cannot be blank');
              return false;
          } else if (passwordval.length <= 5) {
              alert('Password must be at least 6 characters long');
              return false;
          } else if (!hasCharacter || !hasSpecialSymbol || !hasNumberp) {
              alert('Password must contain at least one character, one special symbol, and one number');
              return false;
          } else if (cpasswordval === "") {
              alert('Confirm password cannot be blank');
              return false;
          } else if (passwordval !== cpasswordval) {
              alert('Passwords do not match');
              return false;
          } else {
              return true;
          }
          return true; 
      }

      function isEmail(emailval) {
          var atSymbol = emailval.indexOf("@");
          if (atSymbol < 1) return false;
          var dot = emailval.lastIndexOf('.');
          if (dot <= atSymbol + 2) return false;
          if (dot === emailval.length - 1) return false;
          return true;
      }
  });
</script>

  

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

</body>
</html>
