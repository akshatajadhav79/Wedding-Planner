<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    
    <title>{% block title %} Dashboard {% endblock %} </title>

    <!-- Specific Page CSS goes HERE  -->


<!--boostrap icons-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="{% static "vendor/fontawesome-free/css/all.min.css" %}" rel="stylesheet" type="text/css" />
<!-- Custom styles for this template -->
<link href="{% static 'css/style.css' %}" rel="stylesheet" />
<link href="{% static "css/bootstrap.css" %}" rel="stylesheet" />
<link href="{% static "css/sb-admin-2.min.css" %}" rel="stylesheet" />
<link href="{% static 'css/style-starter.css' %}" rel="stylesheet" />
<!-- Latest compiled and minified CSS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<style>
  a{
    text-decoration:none;
  }
  .w3l-footer-29-main .bottom-copies {
  padding:1;
}
</style>
{% block js %}
{% endblock js %}
</head>
<body>
    <main>
        <div class="container p-4" style="background-color: white;">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card rounded-lg mt-5" style="box-shadow: rgba(0, 0, 0, 0.20) 0px 1px 4px;">
                        <div class="card-header"><h3 class="text-center font-weight-light my-4">
                          <img src="{% static 'images/loga1.png' %}" width="400px" height="110px"></div>
                        <div class="card-body">
                            <form class="form" action="" method="POST" enctype="multipart/form-data">
                                {% csrf_token %}
                                {% include 'mainweb/alert.html' %}
                        
                                <div class=" mb-3">
                                  <label for="username">Username</label>
                                  <input class="form-control" type="text" name="username" placeholder="Enter Username" autocomplete="off" />
                                 
                              </div>
                                <div class=" mb-3">
                                  <label for="password">Password</label>
                                    <input class="form-control" type="password" name="password" placeholder="Enter Password" autocomplete="off" />
                                   
                                </div>
                              
                                <div class="mt-4 mb-0"> 
                                    <input type="submit" name="submit" class="d-grid btn btn-block text-decoration-none" style="background-color:#01E1B8" value="Login">
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center py-3">
                            <div class="small"><a href="#" style="color:#01E1B8">Welcome Back..!</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // When the user scrolls down 20px from the top of the document, show the button
        window.onscroll = function () {
            scrollFunction()
        };

        function scrollFunction() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                document.getElementById("movetop").style.display = "block";
            } else {
                document.getElementById("movetop").style.display = "none";
            }
        }

        // When the user clicks on the button, scroll to the top of the document
        function topFunction() {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        }
    </script>
    <!-- /move top -->

    <script src="{% static "js/script.js" %}"></script>
    <script src="{% static "js/particles.min.js.js" %}"></script>
    <script src="{% static "js/jquery-3.3.1.min.js" %}"></script>
    
    <script src="{% static "vendor/bootstrap/js/bootstrap.bundle.min.js" %}"></script>
    
    <script src="{% static "js/owl.carousel.js" %}"></script>
    <script src="{% static "js/owl.carousel.min.js" %}"></script>
    <script src="{% static "js/jquery-3.3.1.min.js" %}"></script>
    <script src="{% static "js/bootstrap.min.js" %}"></script>

    <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
    <!-- Core plugin JavaScript -->
    <script src="{% static 'vendor/jquery-easing/jquery.easing.min.js' %}"></script>
    <!-- Custom scripts for all pages -->
    <script src="{% static 'js/sb-admin-2.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
