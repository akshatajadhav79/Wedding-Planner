{% if messages %}
{% for message in messages %}
<script>
    setTimeout(function() {
        alert("{{ message }}");
    }, 100);
</script>
{% endfor %}
{% endif %}

{% comment %} 
{% if messages %}
{% for message in messages %}
<div class="alert alert- {{ message.tags}} alert-dismissible fade show text-nowrap"  role="alert" >
<strong >Message:</strong> {{ message }}
<button type="button" class="close pl-5" data-dismiss="alert" aria-label="Close" style="float:right; 
    position: absolute;
    top: 0;
    left:50%;

    color: inherit;"
    >
<span aria-hidden="true">&times;</span> {% endcomment %}
{% comment %} </button>
</div> 
{% endfor %}
{% endif %}{% endcomment %}
